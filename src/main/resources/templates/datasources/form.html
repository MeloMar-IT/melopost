<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${datasource.id == null ? 'Create Data Source' : 'Edit Data Source'}"></title>
    <script>
        function applyTemplate() {
            var select = document.getElementById("templateSelect");
            var selectedOption = select.options[select.selectedIndex];
            if (selectedOption.value) {
                document.getElementById("name").value = selectedOption.text;
                document.getElementById("type").value = selectedOption.dataset.type;
                document.getElementById("operation").value = selectedOption.dataset.operation;
                document.getElementById("url").value = selectedOption.dataset.url;
                document.getElementById("description").value = selectedOption.dataset.description;
            }
        }
    </script>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">
            <a href="/datasources" class="hover:text-blue-600 transition-colors">Data Sources</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-300"></i>
            <span th:text="${datasource.id == null ? 'New Integration' : 'Edit Integration'}" class="text-blue-600">Action</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-700" th:text="${datasource.id == null ? 'Create Data Source' : 'Update Data Source'}">Form</h1>
    </div>

    <div layout:fragment="content">
        <div class="max-w-4xl mx-auto">
            <div class="nm-card overflow-hidden">
                <!-- Template Selection -->
                <div class="p-8 border-b border-white/20 bg-gray-900/5" th:if="${datasource.id == null}">
                    <div class="flex items-center space-x-3 mb-6">
                        <div class="w-10 h-10 nm-inset flex items-center justify-center rounded-lg text-blue-600">
                            <i data-lucide="zap" class="w-5 h-5"></i>
                        </div>
                        <h3 class="text-sm font-bold text-gray-600 uppercase tracking-widest">Quick Start Templates</h3>
                    </div>
                    <select id="templateSelect" class="w-full nm-input px-6 py-3 text-gray-700 font-medium focus:ring-0 transition-all cursor-pointer" onchange="applyTemplate()">
                        <option value="">-- Choose a predefined tool configuration --</option>
                        <option th:each="tpl : ${templates}"
                                th:value="${tpl.name}"
                                th:text="${tpl.name}"
                                th:data-type="${tpl.type}"
                                th:data-operation="${tpl.operation}"
                                th:data-url="${tpl.url}"
                                th:data-description="${tpl.description}">Template</option>
                    </select>
                </div>

                <form th:action="@{/datasources/save}" th:object="${datasource}" method="post" class="p-10 space-y-8">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label for="name" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Source Name</label>
                            <input type="text" id="name" th:field="*{name}" required
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="e.g. Production Jira">
                        </div>

                        <div class="space-y-3">
                            <label for="type" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Integration Type</label>
                            <input type="text" id="type" th:field="*{type}" required
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="e.g. REST API, SQL DB, Webhook">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label for="operation" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Access Level</label>
                            <select id="operation" th:field="*{operation}" required
                                    class="w-full nm-input px-5 py-3 text-gray-700 font-medium cursor-pointer">
                                <option value="Read">Read Only</option>
                                <option value="Create">Read & Write</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label for="url" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Endpoint URL</label>
                            <input type="text" id="url" th:field="*{url}" required
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="https://api.service.com/v1">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label for="username" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Auth Identifier</label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="Username or API Key ID">
                        </div>
                        <div class="space-y-3">
                            <label for="password" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Secret / Token</label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="••••••••••••••••">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label for="description" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Detailed Description</label>
                        <textarea id="description" th:field="*{description}" rows="4"
                                  class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                  placeholder="What is this data source used for?"></textarea>
                    </div>

                    <div class="pt-6 flex items-center justify-end space-x-6">
                        <a href="/datasources" class="nm-button px-6 py-3 text-sm font-bold text-gray-500 hover:text-gray-700">Discard</a>
                        <button type="submit" class="nm-button px-10 py-3 bg-blue-600 text-white font-bold hover:nm-convex transition-all flex items-center">
                            <i data-lucide="save" class="w-5 h-5 mr-3"></i>
                            Save Configuration
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${template.id == null ? 'New Template' : 'Edit Template'}">Template Form</title>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">
            <a href="/templates" class="hover:text-blue-600 transition-colors">Templates</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-300"></i>
            <span th:text="${template.id == null ? 'New Draft' : 'Edit Template'}" class="text-blue-600">Action</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-700" th:text="${template.id == null ? 'Create Report Template' : 'Update Report Template'}">Template Form</h1>
    </div>

    <div layout:fragment="content">
        <div class="max-w-5xl mx-auto">
            <form th:action="@{/templates/save}" th:object="${template}" method="post" class="space-y-8">
                <input type="hidden" th:field="*{id}" />
                
                <div class="nm-card p-10 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                        <div class="space-y-3">
                            <label for="name" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Template Name</label>
                            <input type="text" id="name" th:field="*{name}" required
                                   class="w-full nm-input px-5 py-3 text-gray-700 font-medium"
                                   placeholder="e.g. Executive Summary Report">
                        </div>

                        <div class="pb-3 flex items-center">
                            <label class="relative inline-flex items-center cursor-pointer group">
                                <input type="checkbox" id="isDefault" th:field="*{default}" class="sr-only peer">
                                <div class="w-14 h-7 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600 nm-inset"></div>
                                <span class="ml-4 text-sm font-bold text-gray-600 uppercase tracking-wider">Set as System Default</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label for="content" class="block text-sm font-bold text-gray-500 uppercase tracking-wider ml-1">Mustache Template Source (HTML/Mustache)</label>
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest bg-blue-50 px-2 py-1 rounded">Syntax: Mustache</span>
                        </div>
                        <div class="nm-inset p-2 rounded-2xl">
                            <textarea id="content" th:field="*{content}" required rows="20"
                                      class="w-full bg-transparent border-none focus:ring-0 p-6 text-gray-700 font-mono text-sm leading-relaxed"
                                      placeholder="<html>
  <body>
    <h1>Postmortem: {{title}}</h1>
    ...
  </body>
</html>"></textarea>
                        </div>
                        <p class="text-xs text-gray-400 italic px-2">
                            Use {{variable}} syntax to inject postmortem data. Available fields: title, summary, rootCause, timeline, actions.
                        </p>
                    </div>
                </div>

                <div class="flex justify-end items-center space-x-6">
                    <a href="/templates" class="nm-button px-8 py-3 text-sm font-bold text-gray-500 hover:text-gray-700">Discard Changes</a>
                    <button type="submit" class="nm-button px-10 py-3 bg-blue-600 text-white font-bold hover:nm-convex transition-all flex items-center">
                        <i data-lucide="save" class="w-5 h-5 mr-3"></i>
                        Save Template
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Postmortems</title>
</head>
<body>
    <div layout:fragment="header-title">Postmortems</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-700">All Postmortems</h1>
            <a href="/postmortems/new" class="nm-button px-6 py-2 bg-blue-600 text-white text-sm font-bold hover:nm-concave transition-all flex items-center">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                Create New
            </a>
        </div>

        <div class="nm-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200/50">
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest">Title</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest">Type</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest">Incident Date</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest">Due Date</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest">Incident Ref</th>
                            <th class="px-6 py-5 text-xs font-bold text-gray-500 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200/30">
                        <tr th:each="pm : ${postmortems}" class="hover:nm-inset transition-all group">
                            <td class="px-6 py-5">
                                <div class="flex flex-col">
                                    <a th:href="@{/postmortems/details/{id}(id=${pm.id})}" class="font-bold text-gray-800 hover:text-blue-600 transition-colors" th:text="${pm.title}">Title</a>
                                    <div class="flex flex-wrap gap-2 mt-2">
                                        <span class="text-[10px] text-gray-400 uppercase tracking-widest font-black" th:text="${pm.failedApplication ?: 'N/A'}">Application</span>
                                        <span th:each="tag : ${pm.tags}" th:if="${!#strings.isEmpty(tag)}" class="nm-flat px-2 py-0.5 rounded text-[9px] font-black uppercase text-blue-500" th:text="${tag}">
                                            Tag
                                        </span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-5 text-sm text-gray-600 font-medium" th:text="${pm.type ?: 'N/A'}">Type</td>
                            <td class="px-6 py-5 text-sm text-gray-600 font-medium" th:text="${pm.incidentDate != null ? #temporals.format(pm.incidentDate, 'MMM dd, yyyy') : 'N/A'}">Date</td>
                            <td class="px-6 py-5">
                                <span class="text-sm font-bold" 
                                      th:classappend="${pm.dueDate != null && pm.dueDate.isBefore(#temporals.createNow()) ? 'text-red-500' : 'text-gray-500'}"
                                      th:text="${pm.dueDate != null ? #temporals.format(pm.dueDate, 'MMM dd, yyyy') : 'N/A'}">Due Date</span>
                            </td>
                            <td class="px-6 py-5">
                                <span class="nm-flat px-3 py-1 rounded-full text-[10px] font-black text-gray-600 uppercase tracking-wider" th:text="${pm.incidentRef ?: 'No Ref'}">
                                    INC-123
                                </span>
                            </td>
                            <td class="px-6 py-5 text-right">
                                <div class="flex justify-end space-x-3">
                                    <a th:href="@{/postmortems/details/{id}(id=${pm.id})}" class="nm-button p-2 text-gray-400 hover:text-blue-500 transition-colors" title="View">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </a>
                                    <a th:href="@{/postmortems/edit/{id}(id=${pm.id})}" class="nm-button p-2 text-gray-400 hover:text-green-500 transition-colors" title="Edit">
                                        <i data-lucide="edit" class="w-4 h-4"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${postmortems.empty}">
                            <td colspan="6" class="px-6 py-20 text-center">
                                <div class="flex flex-col items-center">
                                    <div class="w-20 h-20 nm-icon-raised mb-6 text-gray-300">
                                        <i data-lucide="inbox" class="w-10 h-10"></i>
                                    </div>
                                    <p class="text-gray-500 font-bold text-lg">No postmortems found.</p>
                                    <a href="/postmortems/new" class="mt-4 nm-button px-6 py-2 text-blue-600 font-bold hover:nm-concave transition-all">Create your first one</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Database Admin - Melopost</title>
    <style>
        .sql-editor {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
            resize: vertical;
        }
        .table-list-item:hover .table-actions {
            opacity: 1;
        }
        .table-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .loading-overlay {
            background: rgba(255, 255, 255, 0.7);
            display: none;
        }
        .loading-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>
<div layout:fragment="header-title">Database Administration</div>

<div layout:fragment="content" class="h-full flex flex-col p-4 overflow-hidden">
    <div class="flex h-full overflow-hidden space-x-6">
        <!-- Left Sidebar: Tables -->
        <div class="w-72 flex flex-col flex-shrink-0 nm-card overflow-hidden">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
                <h3 class="font-bold text-gray-700 uppercase text-xs tracking-wider">Tables</h3>
                <button onclick="loadTables()" class="nm-button p-1.5 text-gray-400 hover:text-blue-600 transition-colors" title="Refresh Tables">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="tables-list">
                <!-- Tables will be loaded here -->
                <div class="p-4 text-center text-gray-400 italic text-sm">Loading tables...</div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col overflow-hidden relative space-y-6">
            <div id="loading-overlay" class="loading-overlay absolute inset-0 z-50 items-center justify-center rounded-2xl">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <span class="mt-2 text-sm text-gray-600 font-medium">Executing...</span>
                </div>
            </div>

            <!-- Top: SQL Editor -->
            <div class="p-6 nm-card">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-sm font-bold text-gray-600 uppercase tracking-wide">SQL Query</label>
                    <div class="flex space-x-3">
                        <button onclick="clearEditor()" class="nm-button px-4 py-1.5 text-xs text-gray-500 hover:text-gray-700">Clear</button>
                        <button onclick="runQuery()" class="nm-button bg-blue-600 text-white text-sm font-bold py-1.5 px-6 hover:nm-concave transition-all flex items-center">
                            <i data-lucide="play" class="w-4 h-4 mr-2"></i> Run
                        </button>
                    </div>
                </div>
                <textarea id="sql-editor" rows="5" 
                          class="sql-editor w-full nm-input text-sm text-gray-800 focus:ring-2 focus:ring-blue-400 outline-none" 
                          placeholder="SELECT * FROM USERS LIMIT 100"></textarea>
            </div>

            <!-- Bottom: Results Area -->
            <div class="flex-1 flex flex-col overflow-hidden nm-card">
                <div class="px-6 py-3 bg-gray-50/50 border-b border-gray-200 flex justify-between items-center">
                    <span id="result-status" class="text-xs font-bold text-gray-500 uppercase tracking-wider">Ready</span>
                    <div id="result-actions" class="hidden flex space-x-4 items-center">
                        <button onclick="toggleTableDefinition()" id="toggle-definition-btn" class="hidden text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center">
                            <i data-lucide="layout" class="w-3.5 h-3.5 mr-1"></i> Hide Definition
                        </button>
                        <button onclick="exportToCSV()" class="nm-button px-3 py-1 text-xs text-gray-600 hover:text-blue-600 flex items-center">
                            <i data-lucide="download" class="w-3.5 h-3.5 mr-1"></i> Export CSV
                        </button>
                    </div>
                </div>
                
                <div id="query-result-container" class="flex-1 flex flex-col overflow-hidden">
                    <!-- Table Definition Section (Initially Hidden) -->
                    <div id="table-definition-container" class="hidden border-b border-gray-200 bg-gray-50/30 max-h-48 overflow-y-auto">
                        <div class="px-6 py-2 flex justify-between items-center sticky top-0 bg-gray-50 border-b border-gray-200">
                            <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Table Definition: <span id="definition-table-name" class="text-blue-600"></span></h4>
                        </div>
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-100/50 sticky top-0">
                                <tr>
                                    <th class="px-6 py-2 text-left text-[10px] font-bold text-gray-500 uppercase tracking-wider">Column</th>
                                    <th class="px-6 py-2 text-left text-[10px] font-bold text-gray-500 uppercase tracking-wider">Type</th>
                                    <th class="px-6 py-2 text-left text-[10px] font-bold text-gray-500 uppercase tracking-wider">Nullable</th>
                                    <th class="px-6 py-2 text-left text-[10px] font-bold text-gray-500 uppercase tracking-wider">Default</th>
                                    <th class="px-6 py-2 text-center text-[10px] font-bold text-gray-500 uppercase tracking-wider">PK</th>
                                </tr>
                            </thead>
                            <tbody id="definition-table-body" class="divide-y divide-gray-100">
                                <!-- Schema will be loaded here -->
                            </tbody>
                        </table>
                    </div>

                    <div id="empty-results" class="flex-1 flex flex-col items-center justify-center text-gray-400 p-8">
                        <div class="nm-icon-raised w-16 h-16 mb-4 text-gray-300">
                            <i data-lucide="database" class="w-8 h-8"></i>
                        </div>
                        <p class="font-medium">Run a query or select a table to see results</p>
                    </div>
                    
                    <div id="error-results" class="hidden p-6">
                        <div class="nm-card bg-red-50/50 border-l-4 border-red-500 p-4">
                            <div class="flex">
                                <div class="flex-shrink-0">
                                    <i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i>
                                </div>
                                <div class="ml-3">
                                    <p class="text-sm text-red-700 font-bold">Query Error</p>
                                    <p id="error-message" class="text-sm text-red-600 mt-1 font-mono break-all"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="success-results" class="hidden p-6">
                        <div class="nm-card bg-green-50/50 border-l-4 border-green-500 p-4">
                            <div class="flex">
                                <div class="flex-shrink-0">
                                    <i data-lucide="check-circle" class="h-5 w-5 text-green-400"></i>
                                </div>
                                <div class="ml-3">
                                    <p id="success-message" class="text-sm text-green-700 font-medium"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="data-results" class="hidden flex-1 overflow-auto">
                        <table class="min-w-full divide-y divide-gray-200 border-collapse">
                            <thead id="table-head" class="bg-gray-50 sticky top-0 z-10">
                                <!-- Headers -->
                            </thead>
                            <tbody id="table-body" class="divide-y divide-gray-200">
                                <!-- Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Info Modal -->
    <div id="table-info-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeTableInfo()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom nm-card text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
                <div class="px-8 pt-6 pb-6">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-200 pb-4">
                        <h3 class="text-xl font-bold text-gray-900 flex items-center" id="modal-table-name">
                            <i data-lucide="table" class="w-6 h-6 mr-3 text-blue-600"></i>
                            Table Info
                        </h3>
                        <button onclick="closeTableInfo()" class="nm-button p-1.5 text-gray-400 hover:text-gray-600 transition-all">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>
                    
                    <div class="mb-6">
                        <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Structure</h4>
                        <div class="overflow-x-auto nm-inset rounded-xl p-1">
                            <table class="min-w-full divide-y divide-gray-200 bg-transparent">
                                <thead>
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Column</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Type</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Nullable</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Default</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider text-center">PK</th>
                                    </tr>
                                </thead>
                                <tbody id="modal-schema-body" class="divide-y divide-gray-200/50">
                                    <!-- Schema -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50/50 px-8 py-4 sm:flex sm:flex-row-reverse space-x-reverse sm:space-x-4">
                    <button type="button" id="modal-query-btn" class="nm-button bg-blue-600 text-white font-bold px-6 py-2 text-sm hover:nm-concave transition-all">
                        Query Table
                    </button>
                    <button type="button" onclick="closeTableInfo()" class="nm-button bg-white text-gray-700 font-bold px-6 py-2 text-sm hover:nm-convex transition-all">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        // Global State
        let currentTables = [];
        let lastResult = null;
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        document.addEventListener('DOMContentLoaded', () => {
            console.log('Database Admin Page Initialized');
            loadTables();
            
            // Handle Ctrl+Enter to run query
            const editor = document.getElementById('sql-editor');
            if (editor) {
                editor.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        runQuery();
                    }
                });
            }
        });

        async function loadTables() {
            try {
                const response = await fetch('/api/admin/database/tables');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                currentTables = await response.json();
                console.log('Tables loaded:', currentTables);
                renderTablesList();
            } catch (error) {
                console.error('Error loading tables:', error);
                const list = document.getElementById('tables-list');
                if (list) {
                    list.innerHTML = `<div class="p-4 text-center text-red-500 italic text-sm">Error loading tables: ${error.message}</div>`;
                }
            }
        }

        function renderTablesList() {
            const list = document.getElementById('tables-list');
            if (!list) return;

            if (currentTables.length === 0) {
                list.innerHTML = '<div class="p-4 text-center text-gray-400 italic text-sm">No tables found</div>';
                return;
            }

            list.innerHTML = currentTables.map(table => `
                <div class="table-list-item nm-card mb-2 hover:nm-convex transition-all cursor-pointer group p-3" onclick="selectTable('${table.name}')">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center">
                            <i data-lucide="table" class="w-4 h-4 mr-2 text-gray-400 group-hover:text-blue-500"></i>
                            <span class="text-sm font-bold text-gray-700 group-hover:text-blue-700">${table.name}</span>
                        </div>
                        <span class="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full font-bold">${table.rowCount}</span>
                    </div>
                    <div class="mt-1 flex justify-between items-center">
                         <span class="text-[10px] text-gray-400 truncate max-w-[150px] font-medium">${table.columns.join(', ')}</span>
                         <div class="table-actions flex space-x-1">
                             <button onclick="event.stopPropagation(); showTableInfo('${table.name}')" class="nm-button p-1 text-gray-400 hover:text-blue-600" title="Table Info">
                                 <i data-lucide="info" class="w-3.5 h-3.5"></i>
                             </button>
                         </div>
                    </div>
                </div>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }

        function selectTable(tableName) {
            const editor = document.getElementById('sql-editor');
            if (!editor) return;
            editor.value = `SELECT * FROM "${tableName}" LIMIT 100`;
            
            // Show table definition when selecting a table
            loadTableDefinition(tableName);
            
            runQuery();
        }

        async function loadTableDefinition(tableName) {
            const container = document.getElementById('table-definition-container');
            const toggleBtn = document.getElementById('toggle-definition-btn');
            const body = document.getElementById('definition-table-body');
            const nameSpan = document.getElementById('definition-table-name');
            
            if (!container || !body || !nameSpan) return;
            
            try {
                const response = await fetch(`/api/admin/database/table/${tableName}`);
                const data = await response.json();
                
                nameSpan.textContent = data.name;
                body.innerHTML = data.schema.map(col => `
                <tr class="hover:bg-blue-50/30 transition-colors">
                    <td class="px-6 py-2 text-xs font-bold text-gray-800">${col.COLUMN_NAME}</td>
                    <td class="px-6 py-2 text-xs text-gray-500 font-mono">${col.TYPE_NAME}${col.CHARACTER_MAXIMUM_LENGTH ? '('+col.CHARACTER_MAXIMUM_LENGTH+')' : ''}</td>
                    <td class="px-6 py-2 text-xs text-gray-500 font-medium">${col.IS_NULLABLE}</td>
                    <td class="px-6 py-2 text-xs text-gray-500 font-mono text-[10px]">${col.COLUMN_DEFAULT || ''}</td>
                    <td class="px-6 py-2 text-xs text-center">
                        ${data.primaryKeys.includes(col.COLUMN_NAME) ? '<span class="text-yellow-500 filter drop-shadow-sm" title="Primary Key">🔑</span>' : ''}
                    </td>
                </tr>
            `).join('');
                
                container.classList.remove('hidden');
                if (toggleBtn) {
                    toggleBtn.classList.remove('hidden');
                    toggleBtn.innerHTML = '<i data-lucide="layout" class="w-3 h-3 mr-1"></i> Hide Definition';
                }
                if (window.lucide) lucide.createIcons();
            } catch (error) {
                console.error('Error loading table definition:', error);
                container.classList.add('hidden');
            }
        }

        function toggleTableDefinition() {
            const container = document.getElementById('table-definition-container');
            const toggleBtn = document.getElementById('toggle-definition-btn');
            if (!container || !toggleBtn) return;
            
            const isHidden = container.classList.contains('hidden');
            if (isHidden) {
                container.classList.remove('hidden');
                toggleBtn.innerHTML = '<i data-lucide="layout" class="w-3 h-3 mr-1"></i> Hide Definition';
            } else {
                container.classList.add('hidden');
                toggleBtn.innerHTML = '<i data-lucide="layout" class="w-3 h-3 mr-1"></i> Show Definition';
            }
            if (window.lucide) lucide.createIcons();
        }

        function clearEditor() {
            const editor = document.getElementById('sql-editor');
            if (editor) editor.value = '';
        }

        async function runQuery() {
            const editor = document.getElementById('sql-editor');
            if (!editor) return;
            const sql = editor.value.trim();
            if (!sql) return;

            // Hide definition if it's not a SELECT * FROM [table] query
            // This is a simple heuristic to keep the UI clean
            const trimmedSql = sql.toUpperCase();
            if (!trimmedSql.startsWith("SELECT * FROM") && !trimmedSql.includes("LIMIT")) {
                // Keep it if it's the exact table we just loaded, but for general queries hide it
            }

            showLoading(true);
            hideAllResults();

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (csrfHeader && csrfToken) {
                    headers[csrfHeader] = csrfToken;
                }

                const response = await fetch('/api/admin/database/query', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ sql })
                });

                const result = await response.json();
                lastResult = result;
                displayResult(result);
            } catch (error) {
                console.error('Error running query:', error);
                displayError("Failed to connect to server");
            } finally {
                showLoading(false);
            }
        }

        function displayResult(result) {
            const status = document.getElementById('result-status');
            const actions = document.getElementById('result-actions');
            
            if (result.error) {
                displayError(result.error);
                if (status) status.textContent = 'Error';
                if (actions) actions.classList.add('hidden');
                return;
            }

            if (result.isSelect) {
                if (result.rows && result.rows.length > 0) {
                    displayData(result.columns, result.rows);
                    if (status) status.textContent = `${result.rows.length} rows returned`;
                    if (actions) actions.classList.remove('hidden');
                } else {
                    displaySuccess(result.message || "Query executed successfully (0 rows)");
                    if (status) status.textContent = '0 rows returned';
                    if (actions) actions.classList.add('hidden');
                }
            } else {
                displaySuccess(result.message);
                if (status) status.textContent = `Success: ${result.affectedRows} rows affected`;
                if (actions) actions.classList.add('hidden');
                // Refresh tables list if it was a DDL or something that might change counts
                loadTables();
            }
        }

        function displayData(columns, rows) {
            const container = document.getElementById('data-results');
            if (!container) return;
            container.classList.remove('hidden');
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');

            head.innerHTML = `<tr>${columns.map(col => `
                <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider border-b border-gray-200 bg-gray-50/80">${col}</th>
            `).join('')}</tr>`;

            body.innerHTML = rows.map(row => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    ${row.map(cell => `<td class="px-6 py-3 text-sm text-gray-700 border-b border-gray-100 whitespace-nowrap overflow-hidden max-w-xs truncate" title="${cell}">${cell === null ? '<span class="text-gray-300 italic">null</span>' : cell}</td>`).join('')}
                </tr>
            `).join('');
        }

        function displayError(msg) {
            const container = document.getElementById('error-results');
            if (container) {
                container.classList.remove('hidden');
                const msgEl = document.getElementById('error-message');
                if (msgEl) msgEl.textContent = msg;
            }
        }

        function displaySuccess(msg) {
            const container = document.getElementById('success-results');
            if (container) {
                container.classList.remove('hidden');
                const msgEl = document.getElementById('success-message');
                if (msgEl) msgEl.textContent = msg;
            }
        }

        function hideAllResults() {
            const ids = ['empty-results', 'error-results', 'success-results', 'data-results'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
        }

        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (!overlay) return;
            if (show) overlay.classList.add('active');
            else overlay.classList.remove('active');
        }

        async function showTableInfo(tableName) {
            showLoading(true);
            try {
                const response = await fetch(`/api/admin/database/table/${tableName}`);
                const data = await response.json();
                
                const titleEl = document.getElementById('modal-table-name');
                if (titleEl) titleEl.innerHTML = `<i data-lucide="table" class="w-5 h-5 mr-2 text-blue-600"></i> Table: ${data.name}`;
                
                const schemaBody = document.getElementById('modal-schema-body');
                if (schemaBody) {
                    schemaBody.innerHTML = data.schema.map(col => `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-6 py-3 text-sm font-bold text-gray-800">${col.COLUMN_NAME}</td>
                            <td class="px-6 py-3 text-sm text-gray-500 font-mono text-xs">${col.TYPE_NAME}${col.CHARACTER_MAXIMUM_LENGTH ? '('+col.CHARACTER_MAXIMUM_LENGTH+')' : ''}</td>
                            <td class="px-6 py-3 text-sm text-gray-500 font-medium">${col.IS_NULLABLE}</td>
                            <td class="px-6 py-3 text-sm text-gray-500 font-mono text-xs">${col.COLUMN_DEFAULT || ''}</td>
                            <td class="px-6 py-3 text-sm text-center">
                                ${data.primaryKeys.includes(col.COLUMN_NAME) ? '<span class="text-yellow-500 filter drop-shadow-sm" title="Primary Key">🔑</span>' : ''}
                            </td>
                        </tr>
                    `).join('');
                }

                const queryBtn = document.getElementById('modal-query-btn');
                if (queryBtn) {
                    queryBtn.onclick = () => {
                        selectTable(tableName);
                        closeTableInfo();
                    };
                }

                const modal = document.getElementById('table-info-modal');
                if (modal) modal.classList.remove('hidden');
                if (window.lucide) lucide.createIcons();
            } catch (error) {
                console.error('Error loading table info:', error);
            } finally {
                showLoading(false);
            }
        }

        function closeTableInfo() {
            const modal = document.getElementById('table-info-modal');
            if (modal) modal.classList.add('hidden');
        }

        function exportToCSV() {
            if (!lastResult || !lastResult.rows) return;
            
            const headers = lastResult.columns.join(',');
            const rows = lastResult.rows.map(row => 
                row.map(cell => {
                    if (cell === null) return '';
                    let val = String(cell).replace(/"/g, '""');
                    return val.includes(',') || val.includes('"') || val.includes('\n') ? `"${val}"` : val;
                }).join(',')
            );
            
            const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `query_results_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</th:block>
</body>
</html>

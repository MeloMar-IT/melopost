<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | MeloPost</title>
    <link th:href="@{/css/tailwind.min.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
            <div class="flex items-center justify-center mb-6">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center mr-3">
                    <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">MeloPost</h1>
            </div>

            <h2 class="text-lg font-semibold text-gray-800 mb-1">Welcome back</h2>
            <p class="text-sm text-gray-500 mb-6">Please sign in to continue</p>

            <div th:if="${errorMessage}" class="mb-4">
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm" th:text="${errorMessage}">Invalid username or password.</div>
            </div>
            <div th:if="${logoutMessage}" class="mb-4">
                <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-lg text-sm" th:text="${logoutMessage}">You have been signed out.</div>
            </div>

            <form method="post" th:action="@{/login}" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" required autofocus
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex items-center justify-between mt-6">
                    <a href="/" class="text-sm text-gray-500 hover:text-gray-700">Back to home</a>
                    <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <i data-lucide="log-in" class="w-4 h-4 mr-2"></i>
                        Sign in
                    </button>
                </div>
            </form>

            <p class="text-xs text-gray-400 mt-6 text-center">
                Tip: Default test users are created on startup.
            </p>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2024</span> MeloPost</p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>

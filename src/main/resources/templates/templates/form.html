<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${template.id == null ? 'New Template' : 'Edit Template'}">Template Form</title>
</head>
<body>
    <div layout:fragment="header-title" th:text="${template.id == null ? 'New Template' : 'Edit Template'}">Template Form</div>

    <div layout:fragment="content">
        <div class="max-w-4xl mx-auto">
            <form th:action="@{/templates/save}" th:object="${template}" method="post" class="space-y-6">
                <input type="hidden" th:field="*{id}" />
                
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Template Name</label>
                        <input type="text" id="name" th:field="*{name}" required
                               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                               placeholder="e.g. Standard Report">
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="isDefault" th:field="*{default}"
                               class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="isDefault" class="ml-2 block text-sm text-gray-700">
                            Set as Default Template
                        </label>
                    </div>

                    <div>
                        <label for="content" class="block text-sm font-medium text-gray-700 mb-1">Mustache Template Content</label>
                        <textarea id="content" th:field="*{content}" required rows="20"
                                  class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none font-mono text-sm"
                                  placeholder="<html>...</html>"></textarea>
                    </div>
                </div>

                <div class="flex justify-end space-x-3">
                    <a href="/templates" class="px-6 py-2 border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">Cancel</a>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">Save Template</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

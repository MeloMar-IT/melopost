<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Report Templates</title>
</head>
<body>
    <div layout:fragment="header-title">Report Templates</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-gray-700 tracking-tight">Report Templates</h1>
            <a href="/templates/new" class="nm-button px-6 py-2.5 bg-blue-600 text-white text-sm font-semibold flex items-center hover:nm-convex transition-all">
                <i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i>
                Create New Template
            </a>
        </div>

        <div class="nm-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900/5 border-b border-white/20">
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest">Template Name</th>
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest">Configuration Status</th>
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/20">
                        <tr th:each="template : ${templates}" class="hover:bg-gray-900/5 transition-all group">
                            <td class="px-8 py-6">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 nm-inset flex items-center justify-center rounded-lg text-blue-600 mr-4 group-hover:nm-convex transition-all">
                                        <i data-lucide="file-code" class="w-5 h-5"></i>
                                    </div>
                                    <span class="font-bold text-gray-800 text-lg" th:text="${template.name}">Template Name</span>
                                </div>
                            </td>
                            <td class="px-8 py-6">
                                <span th:if="${template.default}" class="nm-inset px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-green-500/10 text-green-700 border border-green-500/20">
                                    System Default
                                </span>
                                <span th:if="${!template.default}" class="nm-inset px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-gray-500/10 text-gray-500 border border-gray-500/20">
                                    Custom Template
                                </span>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <div class="flex justify-end space-x-4">
                                    <a th:href="@{/templates/edit/{id}(id=${template.id})}" class="nm-button p-2.5 text-blue-600 hover:nm-convex transition-all" title="Edit Template">
                                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                                    </a>
                                    <a th:href="@{/templates/delete/{id}(id=${template.id})}" class="nm-button p-2.5 text-red-500 hover:nm-convex transition-all" title="Delete Template" onclick="return confirm('Are you sure you want to delete this template?')">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${templates.empty}">
                            <td colspan="3" class="px-8 py-20 text-center">
                                <div class="flex flex-col items-center">
                                    <div class="w-20 h-20 nm-inset flex items-center justify-center rounded-full text-gray-300 mb-6">
                                        <i data-lucide="file-x" class="w-10 h-10"></i>
                                    </div>
                                    <p class="text-xl font-bold text-gray-500 mb-2">No templates configured</p>
                                    <p class="text-sm text-gray-400 mb-8 max-w-xs mx-auto">Create a template to define how your postmortem reports should look.</p>
                                    <a href="/templates/new" class="nm-button px-8 py-3 bg-blue-600 text-white font-bold inline-flex items-center hover:nm-convex">
                                        <i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i>
                                        Create your first template
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

spring.application.name=melopost

# Database configuration
spring.datasource.url=jdbc:h2:file:./data/melopost;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
# at startup check if the tables are there and if they are up to date if not update them
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# LLM API Configuration
melopost.llm-api.enabled=true
melopost.llm-api.python-executable=python3
melopost.llm-api.script-path=llm_api.py

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${postmortem.id == null ? 'Create New Postmortem' : 'Edit Postmortem'}"></title>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-sm text-gray-500 mb-1">
            <a href="/postmortems" class="hover:text-blue-600">Postmortems</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span th:text="${postmortem.id == null ? 'New' : 'Edit'}">Action</span>
        </div>
        <div th:text="${postmortem.id == null ? 'Create New Postmortem' : 'Edit Postmortem'}">Form</div>
    </div>

    <div layout:fragment="content">
        <div class="max-w-5xl mx-auto">
            <form th:action="@{/postmortems/save}" th:object="${postmortem}" method="post" enctype="multipart/form-data" class="space-y-8">
                <input type="hidden" th:field="*{id}"/>
                
                <!-- Basic Info -->
                <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 space-y-6">
                    <h3 class="text-lg font-bold text-gray-900 border-b border-gray-100 pb-4">General Information</h3>
                    
                    <div class="space-y-2">
                        <label for="title" class="block text-sm font-semibold text-gray-700">Incident Title</label>
                        <input type="text" id="title" th:field="*{title}" required
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="e.g. Database connection pool exhaustion">
                    </div>

                    <div class="space-y-2">
                        <label for="description" class="block text-sm font-semibold text-gray-700">Description</label>
                        <textarea id="description" th:field="*{description}" rows="3"
                                  class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                  placeholder="Summary of what happened and the impact..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="startDate" class="block text-sm font-semibold text-gray-700">Start Date</label>
                            <input type="datetime-local" id="startDate" th:field="*{startDate}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label for="incidentDate" class="block text-sm font-semibold text-gray-700">Incident Date</label>
                            <input type="datetime-local" id="incidentDate" th:field="*{incidentDate}" required
                                   oninput="updateDueDate()"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label for="postMortemMeetingDate" class="block text-sm font-semibold text-gray-700">Post Mortem Meeting Date</label>
                            <input type="datetime-local" id="postMortemMeetingDate" th:field="*{postMortemMeetingDate}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label for="dueDate" class="block text-sm font-semibold text-gray-700">Due Date (3 weeks after incident)</label>
                            <input type="datetime-local" id="dueDate" th:field="*{dueDate}" readonly
                                   class="w-full border border-gray-100 bg-gray-50 rounded-lg px-4 py-2 text-gray-500 outline-none cursor-not-allowed">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label for="incidentRef" class="block text-sm font-semibold text-gray-700">Incident Ref</label>
                            <input type="text" id="incidentRef" th:field="*{incidentRef}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="INC-123">
                        </div>
                        <div class="space-y-2">
                            <label for="incidentSource" class="block text-sm font-semibold text-gray-700">Source</label>
                            <input type="text" id="incidentSource" th:field="*{incidentSource}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="Jira / Azure">
                        </div>
                        <div class="space-y-2">
                            <label for="storyApplication" class="block text-sm font-semibold text-gray-700">Target App</label>
                            <input type="text" id="storyApplication" th:field="*{storyApplication}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="Checkout API">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="department" class="block text-sm font-semibold text-gray-700">Department</label>
                            <input type="text" id="department" th:field="*{department}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="e.g. IT Operations">
                        </div>
                        <div class="space-y-2">
                            <label for="failedApplication" class="block text-sm font-semibold text-gray-700">Application that failed</label>
                            <input type="text" id="failedApplication" th:field="*{failedApplication}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="e.g. Payment Gateway">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="tags" class="block text-sm font-semibold text-gray-700">Tags</label>
                        <input type="text" id="tags" th:field="*{tags}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="e.g. database, performance, outage (comma separated)">
                    </div>

                    <!-- Document Upload in Form -->
                    <div class="space-y-4 pt-4 border-t border-gray-100">
                        <label class="block text-sm font-semibold text-gray-700">Attach Documents</label>
                        <div class="flex items-center space-x-4">
                            <label class="flex-1 cursor-pointer">
                                <span class="sr-only">Choose files</span>
                                <input type="file" name="files" multiple 
                                       class="block w-full text-sm text-slate-500
                                              file:mr-4 file:py-2 file:px-4
                                              file:rounded-full file:border-0
                                              file:text-sm file:font-semibold
                                              file:bg-blue-50 file:text-blue-700
                                              hover:file:bg-blue-100 transition-all">
                            </label>
                        </div>
                        <p class="text-xs text-gray-500 italic">You can select multiple files at once.</p>
                        
                        <!-- List existing documents if editing -->
                        <div th:if="*{!documents.isEmpty()}" class="mt-4 space-y-2">
                            <p class="text-xs font-bold text-gray-400 uppercase">Existing Documents</p>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                <div th:each="doc : *{documents}" class="flex items-center justify-between p-2 bg-gray-50 rounded border border-gray-100">
                                    <div class="flex items-center min-w-0">
                                        <i data-lucide="file" class="w-4 h-4 text-blue-500 mr-2 flex-shrink-0"></i>
                                        <span class="text-xs text-gray-600 truncate" th:text="${doc.fileName}">filename.pdf</span>
                                    </div>
                                    <span class="text-[10px] text-gray-400" th:text="${#numbers.formatInteger(doc.size / 1024, 0) + ' KB'}">12 KB</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Timeline -->
                <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-8 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-gray-900">Incident Timeline</h3>
                        <button type="button" onclick="addTimelineEvent()" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-700">
                            <i data-lucide="plus-circle" class="w-4 h-4 mr-1"></i>
                            Add Event
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b border-gray-100 text-xs font-semibold text-gray-500 uppercase">
                                <tr>
                                    <th class="px-8 py-3 w-64">Date & Time</th>
                                    <th class="px-8 py-3">Event Description</th>
                                </tr>
                            </thead>
                            <tbody id="timeline-body" class="divide-y divide-gray-100">
                                <tr th:each="event, eventStat : *{timelineEvents}">
                                    <td class="px-8 py-4">
                                        <input type="datetime-local" th:field="*{timelineEvents[__${eventStat.index}__].eventTime}" 
                                               class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                                    </td>
                                    <td class="px-8 py-4">
                                        <input type="text" th:field="*{timelineEvents[__${eventStat.index}__].description}" 
                                               class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="What happened?">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Slices / Layers -->
                <div class="space-y-6">
                    <h3 class="text-xl font-bold text-gray-900 flex items-center px-2">
                        <i data-lucide="layers" class="w-6 h-6 mr-2 text-blue-600"></i>
                        Swiss Cheese Analysis
                    </h3>
                    
                    <div th:each="layer, layerStat : *{layers}" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <input type="hidden" th:field="*{layers[__${layerStat.index}__].id}"/>
                        <div class="bg-slate-50 px-8 py-4 border-b border-gray-100 flex justify-between items-center">
                            <h4 class="font-bold text-slate-700" th:text="${layer.name}">Layer Name</h4>
                            <input type="hidden" th:name="|layers[${layerStat.index}].name|" th:value="${layer.name}" />
                            <button type="button" th:onclick="|addHole(${layerStat.index})|" class="text-xs font-bold text-blue-600 hover:underline flex items-center">
                                <i data-lucide="plus" class="w-3 h-3 mr-1"></i>
                                ADD HOLE
                            </button>
                        </div>
                        <div class="p-8 space-y-8" th:id="|holes-container-${layerStat.index}|">
                            <div th:each="hole, holeStat : ${layer.holes}" class="bg-slate-50 border border-slate-200 rounded-xl p-6 space-y-6">
                                <input type="hidden" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].id}"/>
                                <div class="flex items-center space-x-2 text-slate-800 border-b border-slate-200 pb-3">
                                    <i data-lucide="circle-dot" class="w-5 h-5 text-red-500"></i>
                                    <h5 class="font-bold">Hole Definition</h5>
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Hole Description</label>
                                        <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].description}" 
                                               class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Missing validation">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Team Responsible</label>
                                        <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].teamName}" 
                                               class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                    </div>
                                    <div class="space-y-2 md:col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Remedial Action</label>
                                        <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].remedialAction}" 
                                               class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                    </div>
                                    <div class="space-y-2 md:col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Hole Tags (comma separated)</label>
                                        <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].tags}" 
                                               class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. human, technical, process">
                                    </div>
                                </div>

                                    <div class="bg-white border border-slate-200 rounded-lg p-5 space-y-4">
                                        <input type="hidden" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.id}"/>
                                        <div class="flex items-center space-x-2 text-blue-900 font-bold text-sm">
                                        <i data-lucide="ticket" class="w-4 h-4"></i>
                                        <span>Linked Engineering Story</span>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase">Story Number</label>
                                            <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.storyNumber}" 
                                                   class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none">
                                        </div>
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase">Backlog</label>
                                            <input type="text" th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.backlogName}" 
                                                   class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none">
                                        </div>
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase">Priority</label>
                                            <select th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.priority}" 
                                                    class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none bg-white">
                                                <option value="1">1 - Critical</option>
                                                <option value="2">2 - High</option>
                                                <option value="3">3 - Medium</option>
                                                <option value="4">4 - Low</option>
                                                <option value="5">5 - Trivial</option>
                                            </select>
                                        </div>
                                    </div>
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase">Implementation Details (What to fix)</label>
                                            <textarea th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.whatToFix}" 
                                                      class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none" rows="2"></textarea>
                                        </div>
                                        <div class="space-y-1" th:if="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.tags != null && !layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.tags.empty}">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase">System Tags</label>
                                            <div class="flex flex-wrap gap-1">
                                                <span th:each="tag, tagStat : *{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.tags}" 
                                                      th:text="${tag}" 
                                                      class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-200">
                                                </span>
                                                <!-- Preserve tags when submitting the form -->
                                                <input type="hidden" th:each="tag, tagStat : *{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.tags}" 
                                                       th:field="*{layers[__${layerStat.index}__].holes[__${holeStat.index}__].story.tags[__${tagStat.index}__]}"/>
                                            </div>
                                        </div>
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex items-center justify-end space-x-4 pb-12">
                    <a href="/postmortems" class="text-sm font-medium text-gray-500 hover:text-gray-700">Discard Changes</a>
                    <button type="submit" class="inline-flex items-center px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg transition-all transform hover:scale-[1.02]">
                        <i data-lucide="save" class="w-5 h-5 mr-2"></i>
                        Save Postmortem
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script layout:fragment="scripts">
        document.addEventListener('DOMContentLoaded', function() {
            updateDueDate();
        });

        function updateDueDate() {
            const incidentDateInput = document.getElementById('incidentDate');
            const dueDateInput = document.getElementById('dueDate');
            
            if (incidentDateInput.value) {
                const incidentDate = new Date(incidentDateInput.value);
                const dueDate = new Date(incidentDate.getTime() + (21 * 24 * 60 * 60 * 1000));
                
                // Format for datetime-local: YYYY-MM-DDThh:mm
                const year = dueDate.getFullYear();
                const month = String(dueDate.getMonth() + 1).padStart(2, '0');
                const day = String(dueDate.getDate()).padStart(2, '0');
                const hours = String(dueDate.getHours()).padStart(2, '0');
                const minutes = String(dueDate.getMinutes()).padStart(2, '0');
                
                dueDateInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            } else {
                dueDateInput.value = '';
            }
        }

        function addTimelineEvent() {
            const body = document.getElementById('timeline-body');
            const index = body.rows.length;
            const html = `
                <tr class="divide-y divide-gray-100">
                    <td class="px-8 py-4">
                        <input type="datetime-local" name="timelineEvents[${index}].eventTime" 
                               class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </td>
                    <td class="px-8 py-4">
                        <input type="text" name="timelineEvents[${index}].description" 
                               class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="What happened?">
                    </td>
                </tr>
            `;
            body.insertAdjacentHTML('beforeend', html);
        }

        function addHole(layerIndex) {
            const container = document.getElementById(`holes-container-${layerIndex}`);
            const index = container.children.length;
            const html = `
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-6 space-y-6">
                    <div class="flex items-center space-x-2 text-slate-800 border-b border-slate-200 pb-3">
                        <i data-lucide="circle-dot" class="w-5 h-5 text-red-500"></i>
                        <h5 class="font-bold">Hole Definition</h5>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Hole Description</label>
                            <input type="text" name="layers[${layerIndex}].holes[${index}].description" 
                                   class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Team Responsible</label>
                            <input type="text" name="layers[${layerIndex}].holes[${index}].teamName" 
                                   class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Remedial Action</label>
                            <input type="text" name="layers[${layerIndex}].holes[${index}].remedialAction" 
                                   class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Hole Tags (comma separated)</label>
                            <input type="text" name="layers[${layerIndex}].holes[${index}].tags" 
                                   class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. human, technical, process">
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-lg p-5 space-y-4">
                        <div class="flex items-center space-x-2 text-blue-900 font-bold text-sm">
                            <i data-lucide="ticket" class="w-4 h-4"></i>
                            <span>Linked Engineering Story</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Story Number</label>
                                <input type="text" name="layers[${layerIndex}].holes[${index}].story.storyNumber" 
                                       class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Backlog</label>
                                <input type="text" name="layers[${layerIndex}].holes[${index}].story.backlogName" 
                                       class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Priority</label>
                                <select name="layers[${layerIndex}].holes[${index}].story.priority" 
                                        class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none bg-white">
                                    <option value="1">1 - Critical</option>
                                    <option value="2">2 - High</option>
                                    <option value="3">3 - Medium</option>
                                    <option value="4">4 - Low</option>
                                    <option value="5">5 - Trivial</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Implementation Details (What to fix)</label>
                            <textarea name="layers[${layerIndex}].holes[${index}].story.whatToFix" 
                                      class="w-full border border-slate-200 rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            lucide.createIcons();
        }
    </script>
</body>
</html>

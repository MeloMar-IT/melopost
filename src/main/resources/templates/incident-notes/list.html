<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Incident Notes</title>
</head>
<body>
    <div layout:fragment="header-title">Incident Notes</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">All Incident Notes</h1>
            <a href="/incident-notes/create" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                Create New Note
            </a>
        </div>

        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6 p-4">
            <form th:action="@{/incident-notes}" method="get" class="flex items-center space-x-4">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Search by Incident Ref</label>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="INC-12345..." 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium rounded-lg transition-colors">
                        Filter
                    </button>
                    <a th:href="@{/incident-notes}" class="ml-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                        Reset
                    </a>
                </div>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="note : ${notes}" class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow flex flex-col h-full">
                <div class="p-5 border-b border-gray-100 flex justify-between items-start bg-gray-50 rounded-t-xl">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-amber-100 text-amber-600 rounded-lg">
                            <i data-lucide="sticky-note" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900" th:text="${note.incidentRef}">INC-123</h3>
                            <p class="text-xs text-gray-500" th:text="${#temporals.format(note.updatedAt, 'yyyy-MM-dd HH:mm')}">Date</p>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <a th:href="@{/incident-notes/add-to-postmortem/{id}(id=${note.uuid})}" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Add to Existing Postmortem">
                            <i data-lucide="plus-square" class="w-4 h-4"></i>
                        </a>
                        <a th:href="@{/incident-notes/migrate/{id}(id=${note.uuid})}" class="p-1.5 text-gray-400 hover:text-green-600 hover:bg-green-50 rounded-lg transition-colors" title="Migrate to New Postmortem">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                        <a th:href="@{/incident-notes/edit/{id}(id=${note.uuid})}" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </a>
                        <a th:href="@{/incident-notes/delete/{id}(id=${note.uuid})}" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" 
                           onclick="return confirm('Are you sure you want to delete this note?')" title="Delete">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </a>
                    </div>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                    <div class="text-sm text-gray-600 mb-4 flex-1 line-clamp-6 note-preview-content prose prose-sm max-w-none" th:attr="data-markdown=${note.content}">
                        Note content summary...
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center">
                        <span class="text-xs font-medium px-2.5 py-0.5 rounded-full bg-blue-100 text-blue-800" th:text="${note.incidentRef}">INC-123</span>
                        <a th:href="@{/incident-notes/edit/{id}(id=${note.uuid})}" class="text-blue-600 hover:text-blue-700 text-xs font-semibold flex items-center">
                            Open Note <i data-lucide="arrow-right" class="w-3 h-3 ml-1"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(notes)}" class="col-span-full py-20 bg-white rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-center">
                <div class="p-4 bg-gray-50 rounded-full mb-4">
                    <i data-lucide="sticky-note" class="w-12 h-12 text-gray-300"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900">No incident notes found</h3>
                <p class="text-gray-500 mt-1 max-w-sm">Capture notes during an incident and attach them to postmortems later.</p>
                <a href="/incident-notes/create" class="mt-6 inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                    Create First Note
                </a>
            </div>
        </div>
    </div>
    <th:block layout:fragment="script">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('.note-preview-content').forEach(element => {
                    const markdown = element.getAttribute('data-markdown');
                    if (markdown) {
                        element.innerHTML = md.render(markdown);
                    }
                });
            });
        </script>
    </th:block>
</body>
</html>

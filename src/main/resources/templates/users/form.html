<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${user.uuid == null ? 'Create User' : 'Edit User'}"></title>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-sm text-gray-500 mb-1">
            <a href="/users" class="hover:text-blue-600">Users</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span th:text="${user.uuid == null ? 'New' : 'Edit'}">Action</span>
        </div>
        <div th:text="${user.uuid == null ? 'Create User' : 'Edit User'}">Form</div>
    </div>

    <div layout:fragment="content">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <form th:action="@{/users/save}" th:object="${user}" method="post" class="p-8 space-y-6">
                    <input type="hidden" th:field="*{uuid}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="username" class="block text-sm font-semibold text-gray-700">Username</label>
                            <input type="text" id="username" th:field="*{username}" required
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="jdoe">
                        </div>
                        <div class="space-y-2">
                            <label for="email" class="block text-sm font-semibold text-gray-700">Email Address</label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="jane.doe@example.com">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                        <input type="password" id="password" name="password" 
                               th:required="${user.uuid == null}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="Leave empty to keep current password" th:placeholder="${user.uuid == null ? 'Password' : 'Leave empty to keep current password'}">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="firstName" class="block text-sm font-semibold text-gray-700">First Name</label>
                            <input type="text" id="firstName" th:field="*{firstName}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label for="lastName" class="block text-sm font-semibold text-gray-700">Last Name</label>
                            <input type="text" id="lastName" th:field="*{lastName}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">Roles</label>
                        <div class="flex items-center space-x-6">
                            <label class="inline-flex items-center">
                                <input type="checkbox" th:field="*{roles}" value="ADMIN" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                <span class="ml-2 text-sm text-gray-700">ADMIN</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" th:field="*{roles}" value="USER" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                <span class="ml-2 text-sm text-gray-700">USER</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="allowedDepartments" class="block text-sm font-semibold text-gray-700">Allowed Departments (comma-separated)</label>
                        <input type="text" id="allowedDepartments" name="allowedDepartments" th:value="${#strings.listJoin(user.allowedDepartments, ', ')}"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="IT, HR, Finance">
                        <p class="text-xs text-gray-500 mt-1">Leave empty to allow no specific departments (Admins always see everything).</p>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="active" th:field="*{active}" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <label for="active" class="ml-2 block text-sm font-semibold text-gray-700">Account Active</label>
                    </div>

                    <div class="pt-4 flex items-center justify-end space-x-4">
                        <a href="/users" class="text-sm font-medium text-gray-500 hover:text-gray-700">Cancel</a>
                        <button type="submit" class="inline-flex items-center px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-colors">
                            <i data-lucide="save" class="w-4 h-4 mr-2"></i>
                            Save User
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

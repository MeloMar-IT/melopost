<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Select Postmortem</title>
</head>
<body>
    <div layout:fragment="header-title">Select Postmortem</div>

    <div layout:fragment="content">
        <div class="mb-6">
            <a th:href="@{/incident-notes}" class="text-sm text-blue-600 hover:text-blue-700 flex items-center">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i>
                Back to Incident Notes
            </a>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">Add Note to Existing Postmortem</h1>
            <div class="mt-2 p-4 bg-amber-50 border border-amber-200 rounded-lg">
                <p class="text-sm text-amber-800 font-medium">Adding note for: <span class="font-bold" th:text="${note.incidentRef}">INC-123</span></p>
                <p class="text-xs text-amber-700 mt-1 line-clamp-2" th:text="${note.content}">Note content...</p>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6 p-4">
            <form th:action="@{/incident-notes/add-to-postmortem/{id}(id=${note.uuid})}" method="get" class="flex items-center space-x-4">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Search Postmortem</label>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title, description or incident ref..." 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium rounded-lg transition-colors">
                        Search
                    </button>
                    <a th:href="@{/incident-notes/add-to-postmortem/{id}(id=${note.uuid})}" class="ml-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                        Reset
                    </a>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Postmortem</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Incident Ref</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Action</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="pm : ${postmortems}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900" th:text="${pm.title}">Title</div>
                                    <div class="text-xs text-gray-500" th:text="${#temporals.format(pm.incidentDate, 'yyyy-MM-dd')}">Date</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${pm.incidentRef}">
                            INC-123
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:class="${'px-2 py-1 text-xs font-semibold rounded-full ' + 
                                (pm.status == 'Draft' ? 'bg-gray-100 text-gray-800' : 
                                 pm.status == 'In Progress' ? 'bg-blue-100 text-blue-800' : 
                                 pm.status == 'Published' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800')}"
                                  th:text="${pm.status}">
                                Draft
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <form th:action="@{/postmortems/{id}/incident-notes/import(id=${pm.uuid})}" method="post">
                                <input type="hidden" name="noteId" th:value="${note.uuid}">
                                <button type="submit" class="text-blue-600 hover:text-blue-900 bg-blue-50 hover:bg-blue-100 px-3 py-1 rounded-md transition-colors"
                                        th:disabled="${pm.status == 'Published'}">
                                    Add Note
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(postmortems)}">
                        <td colspan="4" class="px-6 py-10 text-center text-gray-500">
                            No postmortems found.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

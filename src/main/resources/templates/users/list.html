<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>User Management</title>
</head>
<body>
    <div layout:fragment="header-title">User Management</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-gray-700 tracking-tight">Application Users</h1>
            <a href="/users/new" class="nm-button px-6 py-2.5 bg-blue-600 text-white text-sm font-semibold flex items-center hover:nm-convex transition-all">
                <i data-lucide="user-plus" class="w-5 h-5 mr-2"></i>
                Add New User
            </a>
        </div>

        <div class="nm-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900/5 border-b border-white/20">
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest">User Profile</th>
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest">Email Address</th>
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest">Roles & Access</th>
                            <th class="px-8 py-5 text-xs font-bold text-gray-400 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/20">
                        <tr th:each="u : ${users}" class="hover:bg-gray-900/5 transition-all group">
                            <td class="px-8 py-6">
                                <div class="flex items-center">
                                    <div class="w-12 h-12 nm-inset flex items-center justify-center rounded-full text-blue-600 font-bold text-lg mr-4 group-hover:nm-convex transition-all shadow-inner" th:text="${#strings.substring(u.username,0,1).toUpperCase()}">U</div>
                                    <div>
                                        <div class="text-lg font-bold text-gray-800 flex items-center">
                                            <span th:text="${u.username}">username</span>
                                            <span th:if="${u.active}" class="ml-3 w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]" title="Active"></span>
                                            <span th:unless="${u.active}" class="ml-3 w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]" title="Inactive"></span>
                                        </div>
                                        <div class="text-xs font-medium text-gray-400 uppercase tracking-wider mt-0.5" th:text="${u.firstName + ' ' + u.lastName}">First Last</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6">
                                <span class="text-sm font-medium text-gray-600 italic" th:text="${u.email}">email@example.com</span>
                            </td>
                            <td class="px-8 py-6">
                                <div class="flex flex-col space-y-2">
                                    <div class="flex flex-wrap gap-2">
                                        <span th:each="role : ${u.roles}" class="nm-inset px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-blue-700 bg-blue-500/5 border border-blue-500/10" th:text="${role}">ROLE</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2" th:if="${not #lists.isEmpty(u.allowedDepartments)}">
                                        <span th:each="dept : ${u.allowedDepartments}" class="px-2 py-0.5 rounded text-[10px] font-bold uppercase text-gray-400 bg-gray-100 border border-gray-200" th:text="${dept}">DEPT</span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <div class="flex justify-end space-x-4">
                                    <a th:href="@{/users/edit/{id}(id=${u.id})}" class="nm-button px-4 py-2 text-sm font-bold text-blue-600 hover:nm-convex transition-all">Edit</a>
                                    <a th:href="@{/users/delete/{id}(id=${u.id})}" class="nm-button px-4 py-2 text-sm font-bold text-red-500 hover:nm-convex transition-all" onclick="return confirm('Are you sure?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="4" class="px-8 py-20 text-center">
                                <div class="flex flex-col items-center">
                                    <div class="w-20 h-20 nm-inset flex items-center justify-center rounded-full text-gray-300 mb-6">
                                        <i data-lucide="users" class="w-10 h-10"></i>
                                    </div>
                                    <p class="text-xl font-bold text-gray-500">No users found</p>
                                    <a href="/users/new" class="mt-8 nm-button px-8 py-3 bg-blue-600 text-white font-bold hover:nm-convex">
                                        <i data-lucide="user-plus" class="w-5 h-5 mr-2"></i>
                                        Add your first user
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

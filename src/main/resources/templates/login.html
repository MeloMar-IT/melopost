<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | MeloPost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --nm-bg: #e0e5ec;
            --nm-shadow-dark: #a3b1c6;
            --nm-shadow-light: #ffffff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--nm-bg);
        }
        .nm-card {
            border-radius: 20px;
            background: var(--nm-bg);
            box-shadow: 12px 12px 24px var(--nm-shadow-dark), 
                        -12px -12px 24px var(--nm-shadow-light);
        }
        .nm-input {
            border-radius: 12px;
            background: var(--nm-bg);
            box-shadow: inset 6px 6px 12px var(--nm-shadow-dark), 
                        inset -6px -6px 12px var(--nm-shadow-light);
            border: none;
            outline: none;
            padding: 10px 15px;
        }
        .nm-button {
            border-radius: 12px;
            background: var(--nm-bg);
            box-shadow: 6px 6px 12px var(--nm-shadow-dark), 
                        -6px -6px 12px var(--nm-shadow-light);
            transition: all 0.2s ease;
        }
        .nm-button:active {
            box-shadow: inset 4px 4px 8px var(--nm-shadow-dark), 
                        inset -4px -4px 8px var(--nm-shadow-light);
        }
        .nm-icon {
            background: var(--nm-bg);
            box-shadow: 4px 4px 8px var(--nm-shadow-dark), 
                        -4px -4px 8px var(--nm-shadow-light);
            border-radius: 50%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="nm-card p-10">
            <div class="flex flex-col items-center justify-center mb-8">
                <div class="w-16 h-16 nm-icon flex items-center justify-center mb-4">
                    <i data-lucide="shield-check" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h1 class="text-3xl font-black text-gray-800 tracking-tight">MeloPost</h1>
            </div>

            <h2 class="text-lg font-bold text-gray-700 mb-1">Welcome back</h2>
            <p class="text-sm text-gray-500 mb-8">Please sign in to continue</p>

            <div th:if="${errorMessage}" class="mb-6">
                <div class="nm-inset bg-red-50/50 text-red-600 px-4 py-3 rounded-xl text-sm font-medium" th:text="${errorMessage}">Invalid username or password.</div>
            </div>
            <div th:if="${logoutMessage}" class="mb-6">
                <div class="nm-inset bg-emerald-50/50 text-emerald-600 px-4 py-3 rounded-xl text-sm font-medium" th:text="${logoutMessage}">You have been signed out.</div>
            </div>

            <form method="post" th:action="@{/login}" class="space-y-6">
                <div>
                    <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <input id="username" name="username" type="text" required autofocus
                           class="w-full nm-input text-gray-700 font-medium">
                </div>
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full nm-input text-gray-700 font-medium">
                </div>

                <div class="flex items-center justify-between mt-10">
                    <a href="/" class="text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">Back to home</a>
                    <button type="submit" class="nm-button px-8 py-3 text-blue-600 font-black flex items-center group">
                        <i data-lucide="log-in" class="w-5 h-5 mr-2 group-hover:translate-x-1 transition-transform"></i>
                        Sign in
                    </button>
                </div>
            </form>

            <p class="text-xs text-gray-400 mt-6 text-center">
                Tip: Default test users are created on startup.
            </p>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2024</span> MeloPost</p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>

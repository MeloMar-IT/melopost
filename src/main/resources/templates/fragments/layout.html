<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE | $CONTENT_TITLE">MeloPost</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #fff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">MeloPost</span>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <a href="/" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="/postmortems" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i>
                <span>Postmortems</span>
            </a>
            <a href="/datasources" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="database" class="w-5 h-5"></i>
                <span>Data Sources</span>
            </a>
            <a href="/templates" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors">
                <i data-lucide="file-code" class="w-5 h-5"></i>
                <span>Report Templates</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center space-x-3 px-3 py-2">
                <div class="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="User">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate">Admin User</p>
                    <p class="text-xs text-slate-400 truncate">melopost@example.com</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <div class="flex items-center flex-1">
                <button class="md:hidden mr-4">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="hidden md:flex items-center flex-1 max-w-md ml-4">
                    <form action="/postmortems" method="get" class="w-full flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search postmortems, holes or stories..." 
                               class="bg-transparent border-none outline-none text-sm w-full text-gray-700">
                    </form>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 ml-8" layout:fragment="header-title">Page Title</h2>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-gray-700">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
                <button class="text-gray-500 hover:text-gray-700">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="text-gray-500 hover:text-red-600 transition-colors flex items-center" title="Sign Out">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </header>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-8" layout:fragment="content">
            <!-- Content will be injected here -->
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>

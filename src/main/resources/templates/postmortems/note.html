<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Postmortem Note - [[${postmortem.title}]]</title>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-sm text-gray-500 mb-1">
            <a href="/postmortems" class="hover:text-blue-600">Postmortems</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <a th:href="@{/postmortems/details/{id}(id=${postmortem.uuid})}" class="hover:text-blue-600" th:text="${postmortem.title}">Title</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span>Note</span>
        </div>
        <div th:text="'Note: ' + ${postmortem.title}">Postmortem Note</div>
    </div>

    <div layout:fragment="content">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-amber-100 text-amber-600 rounded-lg">
                            <i data-lucide="sticky-note" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-gray-900">Postmortem Note</h2>
                            <p class="text-sm text-gray-500">Capture additional details, thoughts, or raw data (max 1MB)</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right min-w-[120px]">
                            <span id="charCount" class="text-sm font-medium text-gray-500">0 / 1,000,000</span>
                        </div>
                    </div>
                </div>
                
                <form th:action="@{/postmortems/{id}/note(id=${postmortem.uuid})}" method="post" class="p-6">
                    <div class="mb-6">
                        <textarea name="note" id="noteArea" rows="20" 
                                  class="w-full h-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-gray-700 font-mono text-sm leading-relaxed"
                                  placeholder="Enter your notes here..."
                                  maxlength="1000000"
                                  th:text="${postmortem.note}"></textarea>
                        <script>document.addEventListener('DOMContentLoaded', () => initFroalaEditor('noteArea', '500px'));</script>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <a th:href="@{/postmortems/details/{id}(id=${postmortem.uuid})}" 
                           class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                            Back to Details
                        </a>
                        <button type="submit" 
                                class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            <i data-lucide="save" class="w-4 h-4 mr-2"></i>
                            Save Note
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const noteArea = document.getElementById('noteArea');
            const charCount = document.getElementById('charCount');

            function updateCharCount() {
                if (!noteArea || !charCount) return;
                const length = noteArea.value.length;
                charCount.textContent = `${length.toLocaleString()} / 1,000,000`;
                
                if (length > 950000) {
                    charCount.classList.remove('text-gray-500');
                    charCount.classList.add('text-red-500');
                } else {
                    charCount.classList.remove('text-red-500');
                    charCount.classList.add('text-gray-500');
                }
            }

            if (noteArea) {
                noteArea.addEventListener('input', updateCharCount);
            }
            // Initial count
            updateCharCount();
        </script>
    </th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${datasource.uuid == null ? 'Create Data Source' : 'Edit Data Source'}"></title>
    <script>
        function applyTemplate() {
            var select = document.getElementById("templateSelect");
            var selectedOption = select.options[select.selectedIndex];
            if (selectedOption.value) {
                document.getElementById("name").value = selectedOption.text;
                document.getElementById("type").value = selectedOption.dataset.type;
                document.getElementById("operation").value = selectedOption.dataset.operation;
                document.getElementById("url").value = selectedOption.dataset.url;
                document.getElementById("description").value = selectedOption.dataset.description;
            }
        }
    </script>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-sm text-gray-500 mb-1">
            <a href="/datasources" class="hover:text-blue-600">Data Sources</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span th:text="${datasource.uuid == null ? 'New' : 'Edit'}">Action</span>
        </div>
        <div th:text="${datasource.uuid == null ? 'Create Data Source' : 'Edit Data Source'}">Form</div>
    </div>

    <div layout:fragment="content">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <!-- Template Selection -->
                <div class="p-6 bg-slate-50 border-b border-gray-100" th:if="${datasource.uuid == null}">
                    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4">Start with a template</h3>
                    <select id="templateSelect" class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" onchange="applyTemplate()">
                        <option value="">-- Select a tool to integrate --</option>
                        <option th:each="tpl : ${templates}"
                                th:value="${tpl.name}"
                                th:text="${tpl.name}"
                                th:data-type="${tpl.type}"
                                th:data-operation="${tpl.operation}"
                                th:data-url="${tpl.url}"
                                th:data-description="${tpl.description}">Template</option>
                    </select>
                </div>

                <form th:action="@{/datasources/save}" th:object="${datasource}" method="post" class="p-8 space-y-6">
                    <input type="hidden" th:field="*{uuid}">
                    
                    <div class="space-y-2">
                        <label for="name" class="block text-sm font-semibold text-gray-700">Source Name</label>
                        <input type="text" id="name" th:field="*{name}" required
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="e.g. Production Jira">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="type" class="block text-sm font-semibold text-gray-700">Type</label>
                            <input type="text" id="type" th:field="*{type}" required
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                   placeholder="e.g. API, DB">
                        </div>
                        <div class="space-y-2">
                            <label for="operation" class="block text-sm font-semibold text-gray-700">Operation</label>
                            <select id="operation" th:field="*{operation}" required
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none bg-white">
                                <option value="Read">Read</option>
                                <option value="Create">Write</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="url" class="block text-sm font-semibold text-gray-700">Endpoint URL</label>
                        <input type="text" id="url" th:field="*{url}" required
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                               placeholder="https://your-instance.atlassian.net/rest/api/3">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="username" class="block text-sm font-semibold text-gray-700">Username / Client ID</label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label for="password" class="block text-sm font-semibold text-gray-700">Password / Token</label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="description" class="block text-sm font-semibold text-gray-700">Description</label>
                        <textarea id="description" th:field="*{description}" rows="3"
                                  class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
                                  placeholder="Optional description of this data source..."></textarea>
                        <script>document.addEventListener('DOMContentLoaded', () => initFroalaEditor('description', '150px'));</script>
                    </div>

                    <div class="pt-4 flex items-center justify-end space-x-4">
                        <a href="/datasources" class="text-sm font-medium text-gray-500 hover:text-gray-700">Cancel</a>
                        <button type="submit" class="inline-flex items-center px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-colors">
                            <i data-lucide="save" class="w-4 h-4 mr-2"></i>
                            Save Data Source
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

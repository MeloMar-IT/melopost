<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Holes Overview</title>
</head>
<body>
    <div layout:fragment="header-title">Holes Overview</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">All Identified Holes</h1>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6 p-4">
            <form th:action="@{/postmortems/holes}" method="get" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Keyword</label>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Description, tags, title..." 
                           class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Team</label>
                    <select name="teamName" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">All Teams</option>
                        <option th:each="team : ${teamNames}" th:value="${team}" th:text="${team}" th:selected="${team == selectedTeam}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Status</label>
                    <select name="actionStatus" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">All Statuses</option>
                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == selectedStatus}"></option>
                    </select>
                </div>
                <div class="flex items-end space-x-2">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 rounded-lg transition-colors">
                        Filter
                    </button>
                    <a th:href="@{/postmortems/holes}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-center text-sm font-semibold py-2 rounded-lg transition-colors">
                        Clear
                    </a>
                </div>
            </form>
        </div>

        <!-- Holes Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100">
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Hole Description</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Team</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Layer</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Postmortem</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Tags</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr th:each="hole : ${holes}" class="hover:bg-blue-50/30 transition-colors group">
                            <td class="px-6 py-4">
                                            <div class="text-sm font-medium text-gray-900 mb-1 prose prose-sm max-w-none" th:utext="${hole.description}">Hole description</div>
                                            <div class="text-xs text-gray-500 italic prose prose-sm max-w-none" th:if="${hole.remedialAction}" th:utext="'Action: ' + ${hole.remedialAction}"></div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-sm text-gray-600" th:text="${hole.teamName ?: 'N/A'}">Team Name</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 bg-slate-100 text-slate-700 rounded text-xs font-medium" th:text="${hole.layerName}">Layer</span>
                            </td>
                            <td class="px-6 py-4">
                                <a th:href="@{'/postmortems/details/' + ${hole.postmortemId}}" 
                                   class="text-sm text-blue-600 hover:text-blue-800 font-medium" 
                                   th:text="${hole.postmortemTitle}">Postmortem Title</a>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${hole.actionStatus == 'COMPLETED'}" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Completed</span>
                                <span th:if="${hole.actionStatus == 'IN_PROGRESS'}" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">In Progress</span>
                                <span th:if="${hole.actionStatus == 'OPEN'}" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Open</span>
                                <span th:if="${hole.actionStatus != 'COMPLETED' && hole.actionStatus != 'IN_PROGRESS' && hole.actionStatus != 'OPEN'}" 
                                      class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800" 
                                      th:text="${hole.actionStatus ?: 'N/A'}">Status</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-wrap gap-1">
                                    <span th:each="tag : ${hole.tags}" 
                                          class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-[10px] font-medium" 
                                          th:text="${tag}">tag</span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(holes)}">
                            <td colspan="6" class="px-6 py-10 text-center text-gray-500">
                                <div class="flex flex-col items-center">
                                    <i data-lucide="info" class="w-8 h-8 mb-2 text-gray-300"></i>
                                    <p>No holes found matching your criteria.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

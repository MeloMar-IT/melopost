# Production Configuration
spring.cassandra.keyspace-name=melopost_prod
spring.cassandra.schema-action=NONE
# Production environment MUST provide these via environment variables
spring.cassandra.local-datacenter=${CASSANDRA_DATACENTER}
spring.cassandra.contact-points=${CASSANDRA_CONTACT_POINTS}
spring.cassandra.port=${CASSANDRA_PORT:9042}

# Logging
logging.level.com.melomarit.melopost=WARN

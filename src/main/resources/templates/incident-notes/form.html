<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${note.uuid != null ? 'Edit Incident Note' : 'Create Incident Note'}">Incident Note</title>
</head>
<body>
    <div layout:fragment="header-title">
        <div class="flex items-center space-x-2 text-sm text-gray-500 mb-1">
            <a href="/incident-notes" class="hover:text-blue-600">Incident Notes</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span th:text="${note.uuid != null ? 'Edit' : 'Create'}">Action</span>
        </div>
        <div th:text="${note.uuid != null ? 'Edit Note: ' + note.incidentRef : 'Create New Incident Note'}">Page Title</div>
    </div>

    <div layout:fragment="content">
        <div class="max-w-4xl mx-auto">
            <form th:action="@{/incident-notes/save}" th:object="${note}" method="post">
                <input type="hidden" th:field="*{uuid}" />

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <div class="flex items-center space-x-3">
                            <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                                <i data-lucide="sticky-note" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold text-gray-900" th:text="${note.uuid != null ? 'Edit Incident Note' : 'New Incident Note'}">Note</h2>
                                <p class="text-sm text-gray-500">Capture details during the incident (max 1MB)</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span id="charCount" class="text-sm font-medium text-gray-500">0 / 1,000,000</span>
                        </div>
                    </div>
                    
                    <div class="p-6 space-y-6">
                        <div>
                            <label for="incidentRef" class="block text-sm font-semibold text-gray-700 mb-2">Incident Reference / Number</label>
                            <input type="text" th:field="*{incidentRef}" id="incidentRef" required
                                   class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                   placeholder="e.g. INC-1234567">
                        </div>

                        <div class="flex items-center justify-between mb-2">
                            <label for="content" class="block text-sm font-semibold text-gray-700">Notes Content</label>
                            <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200" x-data="{ viewMode: 'code' }">
                                <button type="button" @click="viewMode = 'code'; $dispatch('view-mode-changed', 'code')"
                                        :class="viewMode === 'code' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'"
                                        class="px-3 py-1 text-xs font-medium rounded-md transition-all">
                                    Code
                                </button>
                                <button type="button" @click="viewMode = 'split'; $dispatch('view-mode-changed', 'split')"
                                        :class="viewMode === 'split' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'"
                                        class="px-3 py-1 text-xs font-medium rounded-md transition-all">
                                    Split
                                </button>
                                <button type="button" @click="viewMode = 'view'; $dispatch('view-mode-changed', 'view')"
                                        :class="viewMode === 'view' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'"
                                        class="px-3 py-1 text-xs font-medium rounded-md transition-all">
                                    View
                                </button>
                            </div>
                        </div>
                        <div x-data="{ mode: 'code' }" @view-mode-changed.window="mode = $event.detail" class="space-y-4">
                            <div :class="mode === 'view' ? 'hidden' : (mode === 'split' ? 'grid grid-cols-2 gap-4' : 'block')">
                                <div :class="mode === 'split' ? 'h-[600px]' : ''">
                                    <textarea th:field="*{content}" id="contentArea" rows="20" required
                                              class="w-full h-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-gray-700 font-mono text-sm leading-relaxed"
                                              placeholder="Start writing notes here (Markdown supported)..."
                                              maxlength="1000000"
                                              @input="updateCharCount()"></textarea>
                                </div>
                                <div th:if="${false}" id="dummy-for-split"></div> <!-- This is just to help visualization -->
                                <div :class="mode === 'split' ? 'block border rounded-lg p-4 overflow-auto h-[600px] bg-white prose max-w-none' : 'hidden'"
                                     id="markdownPreviewSplit">
                                    <!-- Preview content for split view will be updated via JS -->
                                </div>
                            </div>
                            <div :class="mode === 'view' ? 'block border rounded-lg p-6 overflow-auto min-h-[500px] bg-white prose max-w-none' : 'hidden'"
                                 id="markdownPreviewOnly">
                                <!-- Preview content for full view will be updated via JS -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6 bg-gray-50 border-t border-gray-100 flex items-center justify-between gap-4">
                        <div class="flex items-center space-x-4">
                            <a href="/incident-notes" 
                               class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                                Back to List
                            </a>
                            <a th:if="${note.uuid != null}" th:href="@{/incident-notes/migrate/{id}(id=${note.uuid})}" 
                               class="inline-flex items-center px-4 py-2 border border-blue-600 shadow-sm text-sm font-medium rounded-md text-blue-600 bg-white hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                                <i data-lucide="external-link" class="w-4 h-4 mr-2"></i>
                                Migrate to Postmortem
                            </a>
                        </div>
                        <button type="submit" 
                                class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            <i data-lucide="save" class="w-4 h-4 mr-2"></i>
                            Save Note
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            const contentArea = document.getElementById('contentArea');
            const charCount = document.getElementById('charCount');
            const previewSplit = document.getElementById('markdownPreviewSplit');
            const previewOnly = document.getElementById('markdownPreviewOnly');

            function updateCharCount() {
                const length = contentArea.value.length;
                charCount.textContent = `${length.toLocaleString()} / 1,000,000`;
                
                if (length > 950000) {
                    charCount.classList.remove('text-gray-500');
                    charCount.classList.add('text-red-500');
                } else {
                    charCount.classList.remove('text-red-500');
                    charCount.classList.add('text-gray-500');
                }
                
                // Also update markdown previews
                const html = md.render(contentArea.value);
                if (previewSplit) previewSplit.innerHTML = html;
                if (previewOnly) previewOnly.innerHTML = html;
            }

            contentArea.addEventListener('input', updateCharCount);
            // Initial count and preview
            updateCharCount();
        </script>
    </th:block>
</body>
</html>

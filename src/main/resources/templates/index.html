<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="header-title">Dashboard</div>

    <div layout:fragment="content">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="nm-card p-6 flex items-center space-x-6">
                <div class="w-14 h-14 nm-icon-raised text-blue-600">
                    <i data-lucide="file-text" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Postmortems</p>
                    <p class="text-3xl font-bold text-gray-800" th:text="${postmortemCount}">12</p>
                </div>
            </div>
            <div class="nm-card p-6 flex items-center space-x-6">
                <div class="w-14 h-14 nm-icon-raised text-amber-600">
                    <i data-lucide="alert-circle" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Active Incidents</p>
                    <p class="text-3xl font-bold text-gray-800">3</p>
                </div>
            </div>
            <div class="nm-card p-6 flex items-center space-x-6">
                <div class="w-14 h-14 nm-icon-raised text-green-600">
                    <i data-lucide="check-circle" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Remedies Completed</p>
                    <p class="text-3xl font-bold text-gray-800">85%</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Recent Activity -->
            <div class="nm-card overflow-hidden">
                <div class="p-6 border-b border-gray-200/50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-700">Recent Postmortems</h3>
                    <a href="/postmortems" class="text-sm text-blue-600 font-semibold hover:underline">View all</a>
                </div>
                <div class="p-2">
                    <ul class="space-y-2">
                        <li th:each="pm : ${recentPostmortems}" class="transition-all rounded-xl hover:nm-inset">
                            <a th:href="@{/postmortems/details/{id}(id=${pm.id})}" class="block p-4">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4">
                                        <div class="w-3 h-3 rounded-full bg-blue-500 nm-flat"></div>
                                        <div>
                                            <p class="font-semibold text-gray-800" th:text="${pm.title}">Database connection pool exhaustion</p>
                                            <p class="text-xs text-gray-500">
                                                <span th:text="${#temporals.format(pm.incidentDate, 'yyyy-MM-dd HH:mm')}">2 days ago</span>
                                                • <span th:text="${pm.incidentRef}" class="font-mono">Inc-421</span>
                                            </p>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400"></i>
                                </div>
                            </a>
                        </li>
                        <li th:if="${#lists.isEmpty(recentPostmortems)}" class="p-8 text-center text-gray-500">
                            No recent postmortems found.
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="nm-card p-8">
                <h3 class="font-bold text-gray-700 mb-8">Quick Actions</h3>
                <div class="grid grid-cols-2 gap-6">
                    <a href="/postmortems/new" class="nm-button flex flex-col items-center justify-center p-6 hover:nm-concave transition-all group">
                        <i data-lucide="plus-circle" class="w-10 h-10 text-gray-500 group-hover:text-blue-500 mb-3"></i>
                        <span class="text-sm font-semibold text-gray-600 group-hover:text-blue-700">New Postmortem</span>
                    </a>
                    <a href="/datasources" class="nm-button flex flex-col items-center justify-center p-6 hover:nm-concave transition-all group">
                        <i data-lucide="database" class="w-10 h-10 text-gray-500 group-hover:text-blue-500 mb-3"></i>
                        <span class="text-sm font-semibold text-gray-600 group-hover:text-blue-700">Manage Sources</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

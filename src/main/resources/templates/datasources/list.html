<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Data Sources</title>
</head>
<body>
    <div layout:fragment="header-title">Data Sources</div>

    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-gray-700 tracking-tight">External Integrations</h1>
            <a href="/datasources/new" class="nm-button px-6 py-2.5 bg-blue-600 text-white text-sm font-semibold flex items-center hover:nm-convex transition-all">
                <i data-lucide="plus" class="w-5 h-5 mr-2"></i>
                Add Data Source
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="ds : ${datasources}" class="nm-card flex flex-col overflow-hidden transition-transform hover:scale-[1.02] duration-300">
                <div class="p-8 flex-1">
                    <div class="flex items-center justify-between mb-6">
                        <div class="w-12 h-12 nm-inset flex items-center justify-center rounded-xl text-blue-600">
                            <i data-lucide="database" th:if="${ds.type == 'ServiceNow' or ds.type == 'DB'}" class="w-6 h-6"></i>
                            <i data-lucide="share-2" th:if="${ds.type == 'Jira' or ds.type == 'API'}" class="w-6 h-6"></i>
                            <i data-lucide="cloud" th:if="${ds.type == 'Azure DevOps' or ds.type == 'WEBHOOK'}" class="w-6 h-6"></i>
                        </div>
                        <span class="nm-inset px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-blue-700" th:text="${ds.type}">
                            TYPE
                        </span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2" th:text="${ds.name}">Source Name</h3>
                    <p class="text-sm text-gray-500 truncate mb-6 italic" th:text="${ds.url}">https://api.example.com</p>
                    
                    <div class="nm-inset p-4 rounded-xl space-y-3">
                        <div class="flex items-center justify-between text-xs">
                            <span class="text-gray-400 font-medium">Operation Mode</span>
                            <span class="text-blue-600 font-bold" th:text="${ds.operation}">Operation</span>
                        </div>
                    </div>
                </div>
                <div class="px-8 py-5 flex justify-end space-x-4 bg-gray-900/5 border-t border-white/20">
                    <a th:href="@{/datasources/edit/{id}(id=${ds.id})}" class="nm-button px-4 py-1.5 text-sm font-bold text-gray-600 hover:text-blue-600">Edit</a>
                    <a th:href="@{/datasources/delete/{id}(id=${ds.id})}" class="nm-button px-4 py-1.5 text-sm font-bold text-red-500 hover:text-red-700" onclick="return confirm('Are you sure?')">Delete</a>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${datasources.empty}" class="col-span-full py-20 text-center nm-card border-2 border-dashed border-gray-300/50">
                <div class="w-20 h-20 nm-inset mx-auto mb-6 flex items-center justify-center rounded-full text-gray-400">
                    <i data-lucide="database-zap" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-700">No Data Sources Configured</h3>
                <p class="text-gray-500 mt-2 max-w-sm mx-auto">Connect your Jira, Azure DevOps, or other tools to import incidents and automate postmortems.</p>
                <div class="mt-8">
                    <a href="/datasources/new" class="nm-button px-8 py-3 bg-blue-600 text-white font-bold inline-flex items-center hover:nm-convex">
                        <i data-lucide="plus" class="w-5 h-5 mr-2"></i>
                        Add your first data source
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
